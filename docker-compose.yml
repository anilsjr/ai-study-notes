version: '3.8'

services:
  api:
    build: .
    container_name: study-notes-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - chroma_data:/app/chroma_data
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///./study_notes.db
      - CHROMA_DB_DIR=./chroma_data
    env_file:
      - .env

volumes:
  chroma_data:
